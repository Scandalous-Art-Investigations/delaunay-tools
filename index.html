<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delaunay Art Generator</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #111; color: #eee; display: flex; flex-direction: column; overflow: hidden; }
        nav { background: #000; padding: 15px 0; text-align: center; font-size: 1.1em; flex-shrink: 0; }
        nav a { color: #888; margin: 0 15px; text-decoration: none; font-weight: bold; transition: 0.2s; }
        nav a.active { color: #fff; border-bottom: 2px solid #6DA9FF; padding-bottom: 5px; }
        nav a:hover { color: #fff; }
        .app-container { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; min-height: 0; position: relative; max-width: 1600px; margin: 0 auto; width: 100%; }
        
        .output-window { flex-grow: 1; display: flex; align-items: center; justify-content: center; min-height: 0; background: #1a1a1a; border-radius: 8px; position: relative; overflow: hidden; }
        .svg-pane { width: 100%; height: 100%; display: none; align-items: center; justify-content: center; overflow: hidden; }
        .svg-pane.active { display: flex; }
        #outputCanvas, #originalImagePreview { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        #sourceCanvasContainer { display: none; }
        
        .controls-bar { flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 20px; padding-top: 20px; position: relative;}
        
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background-color: #222; min-width: 180px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5); z-index: 1; border-radius: 8px; border: 1px solid #444; margin-bottom: 15px; overflow: hidden; }
        .dropdown-content a { color: white; padding: 12px 16px; text-decoration: none; display: block; font-size: 0.9em; text-align: center; border-bottom: 1px solid #333;}
        .dropdown-content a:last-child { border-bottom: none; }
        .dropdown-content a:hover { background-color: #333; }
        .show { display: block; }

        .control-button { padding: 0; border-radius: 50%; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; }
        #uploadMenuBtn, #downloadSVGButton { width: 44px; height: 44px; background-color: #2a2a2a; border: 1px solid #444; color: #ccc; }
        #uploadMenuBtn:hover, #downloadSVGButton:hover:not(:disabled) { background-color: #444; color: #fff; }
        #downloadSVGButton:disabled { opacity: 0.3; cursor: not-allowed; }

        #processButton { width: 60px; height: 60px; background-color: #3b82f6; border: none; color: #fff; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        #processButton:hover:not(:disabled) { background-color: #2563eb; transform: scale(1.05); }
        #processButton:active:not(:disabled) { transform: scale(0.95); }
        #processButton:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

        .control-group { display: flex; align-items: center; gap: 10px; background: #222; padding: 10px 15px; border-radius: 12px; border: 1px solid #444; }
        input[type="checkbox"]#colorTriangles { width: 18px; height: 18px; accent-color: #3b82f6; cursor: pointer; }
        label[for="colorTriangles"] { cursor: pointer; font-size: 0.95em; color: #ddd; user-select: none; }
        
        .slider-container { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .slider-container label { font-size: 0.85em; font-weight: bold; color: #aaa; }
        .slider-container span { font-size: 0.95em; color: #3b82f6; font-weight: bold; min-width: 40px; text-align: center; }
        input[type="range"] { width: 150px; cursor: pointer; accent-color: #3b82f6; }

        #status { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 30px; font-weight: bold; z-index: 100; letter-spacing: 1px; pointer-events: none; }
        #imageFile { display: none; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/d3-delaunay@6.0.4/dist/d3-delaunay.min.js"></script>
</head>
<body>
    <nav>
        <a href="index.html" class="active">Delaunay Generator</a>
        <a href="decomposer.html">Color Decomposer</a>
        <a href="hue_shift.html">Hue Matrix Shift</a>
    </nav>
    <div class="app-container" id="appContainer">
        <div class="output-window">
            <div id="paneOriginal" class="svg-pane"><img id="originalImagePreview" style="cursor: pointer;" /></div>
            <div id="paneDelaunay" class="svg-pane active"><canvas id="outputCanvas" style="cursor: pointer;" title="Click and hold to view original image"></canvas></div>
            <div id="status">Processing...</div>
        </div>
        
        <input type="file" id="imageFile" accept="image/*">
        
        <div class="controls-bar">
            
            <div class="dropdown">
                <button class="control-button" id="uploadMenuBtn" title="Select Image">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                </button>
                <div id="uploadDropdown" class="dropdown-content">
                    <a href="#" data-val="Mona_Lisa.png">Mona Lisa</a>
                    <a href="#" data-val="Marilyn_Monroe.jpg">Marilyn Monroe</a>
                    <a href="#" data-val="custom">📁 Upload custom...</a>
                </div>
            </div>

            <button class="control-button" id="processButton" title="Process" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            </button>
            
            <!-- viewToggle removed -->
            <button class="control-button" id="downloadSVGButton" title="Download SVG" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            </button>
        </div>
    </div>
    <div id="sourceCanvasContainer"><canvas id="sourceCanvas"></canvas></div>

<script>
    const imageFileEl = document.getElementById('imageFile');
    const colorTrianglesEl = document.getElementById('colorTriangles');
    const uploadMenuBtn = document.getElementById('uploadMenuBtn');
    const uploadDropdown = document.getElementById('uploadDropdown');
    const processButton = document.getElementById('processButton');
    const downloadSVGButtonEl = document.getElementById('downloadSVGButton');
    const statusEl = document.getElementById('status');
    const sourceCanvas = document.getElementById('sourceCanvas');
    const sourceCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    const outputCanvas = document.getElementById('outputCanvas');
    const outputCtx = outputCanvas.getContext('2d');
    const originalImagePreview = document.getElementById('originalImagePreview');
    
    const paneOriginal = document.getElementById('paneOriginal');
    const paneDelaunay = document.getElementById('paneDelaunay');

    // Click/hold interaction to view original image
    paneDelaunay.addEventListener('mousedown', () => {
        paneDelaunay.classList.remove('active');
        paneOriginal.classList.add('active');
    });
    window.addEventListener('mouseup', () => {
        paneOriginal.classList.remove('active');
        paneDelaunay.classList.add('active');
    });
    // For touch devices
    paneDelaunay.addEventListener('touchstart', (e) => {
        paneDelaunay.classList.remove('active');
        paneOriginal.classList.add('active');
    });
    window.addEventListener('touchend', () => {
        paneOriginal.classList.remove('active');
        paneDelaunay.classList.add('active');
    });

    let originalImageData = null;
    let imageWidth = 0; let imageHeight = 0;
    let processing = false; let currentDelaunayData = null;
    let currentFileName = 'delaunay_art';

    const GOLDEN_RATIO_CONJUGATE = parseFloat(((Math.sqrt(5) - 1) / 2).toFixed(4));
    const baseSettings = {
        imageWidth: 1024, imageHeight: 1536,
        numSeeds: 333, numBoundarySeeds: 11,
        powerFactor: 0.1, edgeThreshold: 33,
        edgeWeightFactor: GOLDEN_RATIO_CONJUGATE, minDistance: 18
    };

    function showStatus(text) {
        if(text) { statusEl.textContent = text; statusEl.style.display = 'block'; }
        else { statusEl.style.display = 'none'; }
    }

    // Dropdown logic
    uploadMenuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        uploadDropdown.classList.toggle('show');
    });
    window.addEventListener('click', (e) => {
        if (!uploadMenuBtn.contains(e.target)) uploadDropdown.classList.remove('show');
    });
    uploadDropdown.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', (e) => {
            e.preventDefault();
            uploadDropdown.classList.remove('show');
            const val = e.target.getAttribute('data-val');
            if (val === 'custom') imageFileEl.click();
            else loadExample(val);
        });
    });

    processButton.addEventListener('click', () => {
        if (originalImageData && !processing) processImage();
    });

    downloadSVGButtonEl.addEventListener('click', () => { if (currentDelaunayData && !processing) downloadSVG(); });
    
    imageFileEl.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        currentFileName = file.name.split('.')[0];
        loadImageFromFile(file);
    });

    document.addEventListener('DOMContentLoaded', () => {
        loadExample('Mona_Lisa.png'); 
    });

    function updateButtonState(imageLoaded, imageProcessed = false) {
        processButton.disabled = !imageLoaded || processing;
        downloadSVGButtonEl.disabled = !imageProcessed || processing;
    }

    function loadExample(url) {
        processing = true; currentDelaunayData = null; updateButtonState(false, false);
        showStatus('Loading...');
        currentFileName = url.split('/').pop().split('.')[0];
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = () => {
            imageWidth = img.width; imageHeight = img.height;
            sourceCanvas.width = imageWidth; sourceCanvas.height = imageHeight;
            sourceCtx.drawImage(img, 0, 0);
            originalImageData = sourceCtx.getImageData(0, 0, imageWidth, imageHeight);
            originalImagePreview.src = img.src;
            processing = false; 
            processImage(); 
        };
        img.onerror = () => { showStatus('Error loading.'); processing = false; updateButtonState(false); };
        img.src = url;
    }

    function loadImageFromFile(file) {
        processing = true; currentDelaunayData = null; updateButtonState(false, false);
        showStatus('Loading...');
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                imageWidth = img.width; imageHeight = img.height;
                sourceCanvas.width = imageWidth; sourceCanvas.height = imageHeight;
                sourceCtx.drawImage(img, 0, 0);
                originalImageData = sourceCtx.getImageData(0, 0, imageWidth, imageHeight);
                originalImagePreview.src = img.src;
                processing = false; 
                processImage();
            }
            img.onerror = () => { showStatus('Error.'); processing = false; updateButtonState(false); }
            img.src = e.target.result;
        }
        reader.onerror = () => { showStatus('Error.'); processing = false; updateButtonState(false); }
        reader.readAsDataURL(file);
    }

    function getPixelColor(imageData, x, y) {
        x = Math.max(0, Math.min(Math.floor(x), imageData.width - 1)); y = Math.max(0, Math.min(Math.floor(y), imageData.height - 1));
        const index = (y * imageData.width + x) * 4;
        return { r: imageData.data[index], g: imageData.data[index + 1], b: imageData.data[index + 2], a: imageData.data[index + 3] };
    }

    function addBoundarySeeds(currentSeeds, width, height, numPerEdge) {
        const bSeeds = [];
        if (width <= 0 || height <= 0 || numPerEdge < 0) return currentSeeds;
        if (numPerEdge > 0) {
            for (let i = 0; i <= numPerEdge; i++) {
                const x = Math.round(i * (width - 1) / numPerEdge); bSeeds.push([x, 0]); bSeeds.push([x, height - 1]);
            }
            for (let i = 1; i < numPerEdge; i++) {
                const y = Math.round(i * (height - 1) / numPerEdge); bSeeds.push([0, y]); bSeeds.push([width - 1, y]);
            }
        }
        let allSeeds = currentSeeds.concat(bSeeds);
        const unique = new Set(), res = [];
        for (const s of allSeeds) { const k = `${Math.round(s[0])},${Math.round(s[1])}`; if (!unique.has(k)) { unique.add(k); res.push(s); } }
        return res;
    }

    async function processImage() {
        if (processing) return;
        processing = true; updateButtonState(true, false);
        if (!d3 || !d3.Delaunay || !originalImageData) { processing = false; updateButtonState(false, false); showStatus(); return; }
        
        showStatus('Processing...');
        // Force a layout recalculation to ensure the status shows before heavy work
        void outputCanvas.offsetWidth;
        
        await new Promise(r => setTimeout(r, 50));

            const cArea = imageWidth * imageHeight; const bArea = baseSettings.imageWidth * baseSettings.imageHeight;
        let aScale = Math.max(0.1, Math.min(10.0, (bArea > 0 && cArea > 0) ? (cArea / bArea) : 1.0));
        let lScale = Math.max(0.25, Math.min(4.0, (Math.min(baseSettings.imageWidth, baseSettings.imageHeight) > 0) ? (Math.min(imageWidth, imageHeight) / Math.min(baseSettings.imageWidth, baseSettings.imageHeight)) : 1.0));

        const numSeeds = Math.max(100, Math.round(baseSettings.numSeeds * aScale));
        const numBSeeds = Math.max(5, Math.round(baseSettings.numBoundarySeeds * lScale));
        const minD = Math.max(1, Math.round(baseSettings.minDistance * lScale));

        let seeds = generateSeeds(numSeeds, baseSettings.powerFactor, baseSettings.edgeThreshold, baseSettings.edgeWeightFactor, minD, imageWidth, imageHeight, originalImageData);
        seeds = addBoundarySeeds(seeds, imageWidth, imageHeight, numBSeeds);
        
        if (seeds.length < 3) { processing = false; updateButtonState(true, false); showStatus(); return; }
        const pForDelaunay = seeds.map(s => [s[0], s[1]]);
        const delaunay = d3.Delaunay.from(pForDelaunay);
        currentDelaunayData = { delaunay, pointsForDelaunay: pForDelaunay };

        outputCanvas.width = imageWidth; 
        outputCanvas.height = imageHeight;

        outputCtx.clearRect(0, 0, outputCanvas.width, outputCanvas.height);
        if (colorTrianglesEl.checked) {
            outputCtx.drawImage(sourceCanvas, 0, 0, imageWidth, imageHeight);
        } else {
            outputCtx.fillStyle = "#111"; outputCtx.fillRect(0, 0, imageWidth, imageHeight);
        }

        for (let i = 0; i < delaunay.triangles.length; i += 3) {
            const p1 = pForDelaunay[delaunay.triangles[i]], p2 = pForDelaunay[delaunay.triangles[i+1]], p3 = pForDelaunay[delaunay.triangles[i+2]];
            if (!p1 || !p2 || !p3) continue;
            outputCtx.beginPath();
            outputCtx.moveTo(p1[0], p1[1]); outputCtx.lineTo(p2[0], p2[1]); outputCtx.lineTo(p3[0], p3[1]);
            outputCtx.closePath();

            if (colorTrianglesEl.checked) {
                const col = getPixelColor(originalImageData, (p1[0]+p2[0]+p3[0])/3, (p1[1]+p2[1]+p3[1])/3);
                outputCtx.fillStyle = `rgba(${col.r},${col.g},${col.b},${col.a/255})`;
                outputCtx.fill();
                outputCtx.strokeStyle = `rgba(${Math.floor(col.r*0.8)},${Math.floor(col.g*0.8)},${Math.floor(col.b*0.8)},0.5)`;
            } else {
                outputCtx.strokeStyle = "#444";
            }
            outputCtx.lineWidth = 0.5; outputCtx.stroke();
        }
        
        processing = false; 
        updateButtonState(true, true);
        showStatus(null);
    }

    function generateSeeds(numDesiredSeeds, powerFactor, edgeThreshold, edgeWeightFactor, minDistance, width, height, imageData) {
        const seeds = []; const numCandidates = numDesiredSeeds * 20; const candidatesInfo = [];
        const grayscale = new Uint8Array(width * height); let maxMag = 0;
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                const i = y * width + x; const r = imageData.data[i*4], g = imageData.data[i*4+1], b = imageData.data[i*4+2];
                grayscale[i] = Math.round(0.299 * r + 0.587 * g + 0.114 * b);
                if (edgeWeightFactor > 0 && edgeWeightFactor <=1 ) {
                    let Gx = 0, Gy = 0;
                    for(let k_y = -1; k_y <= 1; k_y++) {
                        for (let k_x = -1; k_x <= 1; k_x++) {
                            const cY = y + k_y, cX = x + k_x;
                            if (cY >= 0 && cY < height && cX >= 0 && cX < width) {
                                const val = grayscale[cY * width + cX];
                                Gx += val * [[-1,0,1],[-2,0,2],[-1,0,1]][k_y+1][k_x+1]; Gy += val * [[-1,-2,-1],[0,0,0],[1,2,1]][k_y+1][k_x+1];
                            }
                        }
                    }
                    let mag = Math.sqrt(Gx*Gx + Gy*Gy); if (mag > maxMag) maxMag = mag;
                }
            }
        }
        for (let i = 0; i < numCandidates; i++) {
            const cX = Math.random() * width, cY = Math.random() * height;
            const x = Math.floor(cX), y = Math.floor(cY);
            if (x < 0 || x >= width || y < 0 || y >= height) continue;
            const bness = grayscale[y * width + x] / 255.0; const dark = Math.pow(1.0 - bness, powerFactor);
            let edgeC = 0;
            if (edgeWeightFactor > 0 && edgeWeightFactor <=1) {
                let Gx = 0, Gy = 0;
                 for(let k_y = -1; k_y <= 1; k_y++) {
                    for (let k_x = -1; k_x <= 1; k_x++) {
                        const cY = y + k_y, cX = x + k_x;
                        if (cY >= 0 && cY < height && cX >= 0 && cX < width) {
                            const val = grayscale[cY * width + cX];
                            Gx += val * [[-1,0,1],[-2,0,2],[-1,0,1]][k_y+1][k_x+1]; Gy += val * [[-1,-2,-1],[0,0,0],[1,2,1]][k_y+1][k_x+1];
                        }
                    }
                }
                let mag = Math.sqrt(Gx*Gx + Gy*Gy);
                if (mag > edgeThreshold) edgeC = (maxMag > 0) ? (mag / maxMag) : 0;
            }
            const cWeight = edgeWeightFactor * edgeC + (1.0 - edgeWeightFactor) * dark;
            candidatesInfo.push({ point: [cX, cY], weight: 0.02 + 0.98 * Math.max(0, Math.min(1, cWeight)) });
        }
        candidatesInfo.sort((a, b) => b.weight - a.weight); const minDSq = minDistance * minDistance;
        for (const c of candidatesInfo) {
            if (seeds.length >= numDesiredSeeds) break;
            let tooClose = false;
            for (const s of seeds) { if (Math.pow(s[0]-c.point[0],2) + Math.pow(s[1]-c.point[1],2) < minDSq) { tooClose = true; break; } }
            if (!tooClose) seeds.push(c.point);
        }
        if (seeds.length < numDesiredSeeds) {
            let uSet = new Set(seeds.map(s => `${Math.round(s[0])},${Math.round(s[1])}`));
            for (let i = 0; i < candidatesInfo.length && seeds.length < numDesiredSeeds; i++) {
                 if (candidatesInfo[i].weight < 0.01 && seeds.length > numDesiredSeeds * 0.75) break;
                 const k = `${Math.round(candidatesInfo[i].point[0])},${Math.round(candidatesInfo[i].point[1])}`;
                 if (!uSet.has(k)) { seeds.push(candidatesInfo[i].point); uSet.add(k); }
            }
        }
        while (seeds.length < numDesiredSeeds) seeds.push([Math.random() * width, Math.random() * height]);
        return seeds;
    }

    function generateSVGString() {
        if (!currentDelaunayData || !originalImageData) return null;
        const { delaunay, pointsForDelaunay } = currentDelaunayData;
        let svgString = `<svg width="${imageWidth}" height="${imageHeight}" viewBox="0 0 ${imageWidth} ${imageHeight}" xmlns="http://www.w3.org/2000/svg" style="background-color: ${colorTrianglesEl.checked ? 'transparent' : '#111'};">\n`;
        for (let i = 0; i < delaunay.triangles.length; i += 3) {
            const p1 = pointsForDelaunay[delaunay.triangles[i]], p2 = pointsForDelaunay[delaunay.triangles[i+1]], p3 = pointsForDelaunay[delaunay.triangles[i+2]];
            if (!p1 || !p2 || !p3) continue;
            let fill = "none", stroke = "#444", strokeW = 0.5;
            if (colorTrianglesEl.checked) {
                const c = getPixelColor(originalImageData, (p1[0]+p2[0]+p3[0])/3, (p1[1]+p2[1]+p3[1])/3);
                fill = c.a===255 ? `rgb(${c.r},${c.g},${c.b})` : `rgba(${c.r},${c.g},${c.b},${(c.a/255).toFixed(2)})`;
                stroke = `rgba(${Math.floor(c.r*0.7)},${Math.floor(c.g*0.7)},${Math.floor(c.b*0.7)},0.6)`;
                strokeW = 0.3;
            }
            svgString += `  <polygon points="${p1[0].toFixed(2)},${p1[1].toFixed(2)} ${p2[0].toFixed(2)},${p2[1].toFixed(2)} ${p3[0].toFixed(2)},${p3[1].toFixed(2)}" fill="${fill}" stroke="${stroke}" stroke-width="${strokeW}" />\n`;
        }
        return svgString + `</svg>`;
    }

    function downloadSVG() {
        const svgData = generateSVGString();
        if (svgData) {
            const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url;
            a.download = currentFileName + '.svg';
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
        }
    }
</script>
</body>
</html>
